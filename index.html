<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream Integrity</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #0b1220;
    color: white;
    text-align: center;
}

.button {
    background: #3b82f6;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    display: inline-block;
}

input {
    padding: 10px;
    margin: 10px;
}
</style>

</head>

<body>

<h1>Stream Integrity</h1>

<div id="login">
    <h2>Login</h2>
    <input id="email" placeholder="Email"><br>
    <input id="password" type="password" placeholder="Passwort"><br>
    <div class="button" onclick="login()">Einloggen</div>
</div>

<div id="dashboard" style="display:none;">
    <h2>Dashboard</h2>
    <p>Views: <span id="views"></span></p>
    <p>Bots: <span id="bots"></span></p>
</div>

<script>
// 🔴 HIER DEINE FIREBASE DATEN EINSETZEN
const firebaseConfig = {
  apiKey: "DEIN_KEY",
  authDomain: "DEIN_DOMAIN",
  projectId: "DEIN_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

function login() {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, password)
    .then(() => {
        document.getElementById("login").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
        loadData();
    })
    .catch(err => alert(err.message));
}

function loadData() {
    db.collection("stats").doc("main").get().then(doc => {
        let data = doc.data();
        document.getElementById("views").innerText = data.views;
        document.getElementById("bots").innerText = data.bots;
    });
}
</script>

</body>
</html>
