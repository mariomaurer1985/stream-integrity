<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analyse - Stream Integrity</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e3a8a);
  color: white;
}

nav {
  position: fixed;
  width: 100%;
  top: 0;
  background: rgba(15,23,42,0.9);
  padding: 15px;
  text-align: center;
  backdrop-filter: blur(10px);
}

nav a {
  color: white;
  margin: 0 20px;
  text-decoration: none;
  font-weight: 500;
}

.container {
  margin-top: 120px;
  text-align: center;
}

h1 {
  font-size: 3rem;
  margin-bottom: 40px;
}

.dashboard {
  display: flex;
  justify-content: center;
  gap: 30px;
  flex-wrap: wrap;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 30px;
  border-radius: 20px;
  width: 250px;
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
}

.value {
  font-size: 2rem;
  font-weight: bold;
  margin-top: 10px;
}

.label {
  color: #94a3b8;
}

.footer {
  margin-top: 80px;
  font-size: 0.9rem;
  color: #94a3b8;
}
</style>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="about.html">Über uns</a>
  <a href="analysis.html">Analyse</a>
  <a href="contact.html">Kontakt</a>
</nav>

<div class="container">

  <h1>Live Analyse Dashboard</h1>

  <div class="dashboard">

  <div class="card">
    <div class="label">Views</div>
    <div class="value" id="views">100000</div>
  </div>

  <div class="card">
    <div class="label">Bot Traffic</div>
    <div class="value" id="bots">20000</div>
  </div>

  <div class="card">
    <div class="label">Echte Nutzer</div>
    <div class="value" id="real">80000</div>
  </div>

  <div class="card">
    <div class="label">Integrität</div>
    <div class="value" id="score">80%</div>
  </div>

</div>

<script>
let views = 100000;
let bots = 20000;

setInterval(() => {
  views += Math.floor(Math.random() * 50);
  bots += Math.floor(Math.random() * 10);

  let real = views - bots;
  let score = Math.floor((real / views) * 100);

  document.getElementById("views").innerText = views.toLocaleString();
  document.getElementById("bots").innerText = bots.toLocaleString();
  document.getElementById("real").innerText = real.toLocaleString();
  document.getElementById("score").innerText = score + "%";

}, 1500);
</script>

  </div>

  <div class="footer">
    KI-basierte Echtzeitanalyse von Streaming-Daten
  </div>

</div>

</body>
</html>
