
<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<title>Analyse</title>
</head>
<body style="background:#020617;color:white;font-family:sans-serif">

<h1>Live Analyse</h1>

<p id="views"></p>
<p id="bots"></p>

<script>
let views=1000000;
let bots=200000;

setInterval(()=>{
views+=Math.floor(Math.random()*500);
bots+=Math.floor(Math.random()*50);

document.getElementById("views").innerText="Views: "+views;
document.getElementById("bots").innerText="Bots: "+bots;
},2000);
</script>

<a href="index.html">Zurück</a>

</body>
</html>
